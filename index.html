<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Kanit", sans-serif;
        font-weight: 300;
        font-style: italic;
      }
      .button-27 {
        appearance: none;
        background-color: #000000;
        border: 2px solid #1a1a1a;
        border-radius: 15px;
        box-sizing: border-box;
        color: #ffffff;
        cursor: pointer;
        display: inline-block;
        font-family:
          Roobert,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Helvetica,
          Arial,
          sans-serif,
          "Apple Color Emoji",
          "Segoe UI Emoji",
          "Segoe UI Symbol";
        font-size: 16px;
        font-weight: 600;
        line-height: normal;
        margin: 0;
        min-height: 60px;
        min-width: 150px;
        outline: none;
        padding: 16px 24px;
        text-align: center;
        text-decoration: none;
        transition: all 300ms cubic-bezier(0.23, 1, 0.32, 1);
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        width: 20%;
        will-change: transform;
      }

      .button-27:disabled {
        pointer-events: none;
      }

      .button-27:hover {
        box-shadow: rgba(0, 0, 0, 0.25) 0 8px 15px;
        transform: translateY(-2px);
      }

      .button-27:active {
        box-shadow: none;
        transform: translateY(0);
      }

      @media screen and (max-width: 450px) {
        .flex-column {
          margin-top: 100px;
        }
        .button-27 {
          width: 70%;
        }
      }
    </style>
  </head>
  <body style="background: linear-gradient(to right, #fc5c7d, #6a82fb)">
    <div class="row justify-content-md-center align-items-center vh-100 px-5">
      <div
        class="row justify-content-md-center align-items-center flex-column"
        style="height: 100%"
      >
        <div
          class="card shadow-lg p-3 mb-5 rounded"
          style="
            width: 100%;
            max-width: 500px;
            background: #ffffff94;
            color: #1e1e1e;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
          "
        >
          <div class="card-header">Quote</div>
          <div class="card-body">
            <figure>
              <blockquote class="blockquote">
                <p id="quite">
                  <!-- A well-known quote, contained in a blockquote element. -->
                </p>
              </blockquote>
              <!-- <figcaption class="blockquote-footer">
                Someone famous in
                <cite title="Source Title">Source Title</cite>
              </figcaption> -->
            </figure>
          </div>
        </div>
        <!-- HTML !-->
        <button onclick="fetchRandomQuote()" class="button-27" role="button">
          Button
        </button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- This script tag loads the main JavaScript file (script.js) for the Quote Fetcher application, which handles dynamic functionality such as fetching and displaying quotes. -->
    <script src="./script.js"></script>
  </body>
</html>
